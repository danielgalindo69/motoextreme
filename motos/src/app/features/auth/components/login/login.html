<div>
  <form [formGroup]="FormLogin">
  <label for="">Ingrese el usuario</label>
  <input type="text" id="user" formControlName="user">
  <label for="">Ingrese la contraseña</label>
  <input type="text" id="password" formControlName="password">
  @if (FormLogin.invalid) {
    <p>requerido</p>
  }

  <button (click)="Login()">mandar</button>
</form>

</div>
