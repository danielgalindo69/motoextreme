<div class="content">

  <!-- FORMULARIO PARA CREAR -->
  <div class="form-crear">
    <input [(ngModel)]="nuevo.nombre" name="nombre" placeholder="Nombre" required />
    <input [(ngModel)]="nuevo.descripcion" name="descripcion" placeholder="Descripción" />
    <input [(ngModel)]="nuevo.precio" name="precio" type="number" placeholder="Precio" required />
    <input [(ngModel)]="nuevo.idCategoria" name="idCategoria" type="number" placeholder="ID Categoría" required />

    <button class="btn-delete" (click)="crearAccesorio()">Crear Accesorio</button>
  </div>


  <!-- LISTA DE ACCESORIOS -->
  <ul>
    <li *ngFor="let acc of accesorios" class="item">

      <!-- MODO VISUAL -->
      <div *ngIf="!acc.editando" class="info-usuario">
        <div class="col"><strong>{{ acc.nombre }}</strong></div>
        <div class="col">{{ acc.precio }} COP</div>
        <div class="col">Categoria: {{ acc.idCategoria }}</div>

        <div class="acciones">
          <button class="btn-edit" (click)="habilitarEdicion(acc)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
              <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
              <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
            </svg>
            Editar
          </button>
          <button class="btn-delete" (click)="eliminarAccesorio(acc.idAccesorio)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
              <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
            </svg>
            Eliminar
          </button>
        </div>
      </div>

      <!-- MODO EDICIÓN -->
      <div *ngIf="acc.editando" class="form-crear">
        <input [(ngModel)]="acc.nombre" name="editNombre-{{acc.idAccesorio}}" placeholder="Nombre" />
        <input [(ngModel)]="acc.descripcion" name="editDescripcion-{{acc.idAccesorio}}" placeholder="Descripción" />
        <input [(ngModel)]="acc.precio" type="number" name="editPrecio-{{acc.idAccesorio}}" placeholder="Precio" />
        <input [(ngModel)]="acc.idCategoria" type="number" name="editCategoria-{{acc.idAccesorio}}" placeholder="ID Categoría" />

        <button class="btn-save" (click)="guardarEdicion(acc)">Guardar</button>
        <button class="btn-delete" (click)="cancelarEdicion(acc)">Cancelar</button>
      </div>

    </li>
  </ul>

</div>

<app-footer></app-footer>
