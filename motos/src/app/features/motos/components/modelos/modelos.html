<app-header></app-header>

<div class="modelos">

  <aside class="side-bar">
    <h3 class="titulo-filtro">Categorías</h3>
    <div class="checkBox">
      <label><input type="checkbox"> Todas</label>
      <label><input type="checkbox"> Deportiva</label>
      <label><input type="checkbox"> Cruiser</label>
      <label><input type="checkbox"> Naked</label>
      <label><input type="checkbox"> Adventure</label>
      <label><input type="checkbox"> Touring</label>
    </div>

    <h3 class="titulo-filtro">Rango de Precio</h3>
    <input type="range" min="0" max="30000">

    <h3 class="titulo-filtro">Año</h3>
    <div class="checkBox">
      <label><input type="checkbox"> Todos</label>
      <label><input type="checkbox"> 2025</label>
      <label><input type="checkbox"> 2024</label>
    </div>
  </aside>

  <div class="contenedor-motos">

    <h2 class="titulo">Lista de Motos</h2>

    <div class="grid-motos">
      <div class="card-moto" *ngFor="let moto of motos">

        <div class="card-body">
          <span class="categoria">{{ moto.marca }}</span>
          <h3>{{ moto.nombre }}</h3>

          <p class="precio">${{ moto.precio }}</p>
          <button [routerLink]="['/modelos', moto.idMoto]">Ver detalles</button>
        </div>

      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
